<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title>Historial - Taller Mecánico</title>
</head>
<body>

<div layout:fragment="content">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-secondary">Historial de Órdenes</h2>
    </div>

    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body bg-light">
            <form class="row g-2 align-items-center">
                <div class="col-md-3">
                    <input type="text" class="form-control" placeholder="Buscar por Patente...">
                </div>
                <div class="col-md-3">
                    <input type="date" class="form-control">
                </div>
                <div class="col-md-3">
                    <select class="form-select">
                        <option value="">Todos los estados</option>
                        <option value="INGRESADO">Ingresado</option>
                        <option value="EN_REVISION">En Revisión</option>
                        <option value="TERMINADO">Terminado</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button type="button" class="btn btn-primary w-100 fw-bold">Buscar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0"> 
            <div class="table-responsive">
                <table class="table table-hover table-striped mb-0 align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Fecha</th>
                            <th>Patente</th>
                            <th>Cliente</th>
                            <th>Estado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="i : ${#numbers.sequence(1, 3)}">
                            <td class="fw-bold text-primary" th:text="'#ORD-00' + ${i}">#ORD-001</td>
                            <td>20-06-2026</td>
                            <td>
                                <span class="badge bg-secondary text-uppercase">ABCD12</span>
                            </td>
                            <td th:text="'Cliente ' + ${i}">Cliente 1</td>
                            <td>
                                <span class="badge bg-warning text-dark">En Revisión</span>
                            </td>
                            <td class="text-center">
                                <button class="btn btn-sm btn-outline-primary me-1">Ver</button>
                                <button class="btn btn-sm btn-outline-danger">Generar PDF</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

</body>
</html>
